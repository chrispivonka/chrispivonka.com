<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="Kitty Cam - Authenticated live stream"
    />
    <meta name="author" content="Chris Pivonka" />
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https:; frame-src https://www.youtube.com https://www.youtube-nocookie.com https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
    />
    <meta
      http-equiv="Permissions-Policy"
      content="geolocation=(), microphone=(), camera=()"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Kitty Cam - chrispivonka.com</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Custom Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap icons-->
    <link
      href="assets/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <main class="flex-shrink-0">
      <!-- Header placeholder -->
      <div id="header-placeholder"></div>
      <!-- Kitty Cam Section -->
      <section class="py-5">
        <div class="container px-5 mb-5">
          <div class="text-center mb-5">
            <h1 class="display-5 fw-bolder mb-0">
              <span class="text-gradient d-inline">Kitty Cam</span>
            </h1>
          </div>
          <div class="row gx-5 justify-content-center">
            <div class="col-lg-11 col-xl-9 col-xxl-8">
              <div class="card overflow-hidden shadow rounded-4 border-0">
                <div class="card-body p-0">
                  <!-- Stream container - populated by stream-loader.js -->
                  <div id="stream-container" class="ratio ratio-16x9">
                    <div class="d-flex align-items-center justify-content-center bg-dark text-white">
                      <div class="text-center">
                        <div class="spinner-border text-light mb-3" role="status">
                          <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mb-0">Loading stream...</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <p class="text-muted text-center mt-3">
                Live stream from the kitty cam. The stream may be offline at times.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- Back to top button -->
    <button
      id="backToTopBtn"
      class="back-to-top"
      type="button"
      aria-label="Back to top"
    >
      <i class="bi bi-arrow-up"></i>
    </button>
    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>
    <!-- Bootstrap core JS-->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-QWTrJ+DtHUVHc7qk7TiMVadPvHXBeqJ6nfbbVfM7KxVrVzRiYupKcNU+rLCombLi"
      crossorigin="anonymous"
    ></script>
    <!-- Core theme JS -->
    <script type="module" src="js/scripts.js"></script>
    <!-- Stream loader -->
    <script type="module" src="stream-loader.js"></script>
  </body>
</html>
