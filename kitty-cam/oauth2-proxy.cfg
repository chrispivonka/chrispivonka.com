## OAuth2 Proxy Configuration for Kitty Cam
## https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview

# Provider
provider = "google"

# Credentials — set via environment variables (see .env.example):
#   OAUTH2_PROXY_CLIENT_ID
#   OAUTH2_PROXY_CLIENT_SECRET
#   OAUTH2_PROXY_COOKIE_SECRET

# Access control — only emails in this file can access the page
authenticated_emails_file = "/etc/oauth2-proxy/allowed-emails.txt"

# Upstream — nginx serving the static page (internal only)
upstreams = ["http://nginx:8080"]

# Listener
http_address = "0.0.0.0:80"
https_address = "0.0.0.0:443"

# TLS — Let's Encrypt certificates (obtain with certbot)
tls_cert_file = "/etc/letsencrypt/live/kittycam.chrispivonka.com/fullchain.pem"
tls_key_file = "/etc/letsencrypt/live/kittycam.chrispivonka.com/privkey.pem"

# Cookie
cookie_name = "_kitty_cam_auth"
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_domains = [".chrispivonka.com"]
cookie_expire = "168h"
cookie_refresh = "1h"

# OAuth callback
redirect_url = "https://kittycam.chrispivonka.com/oauth2/callback"

# Behavior
reverse_proxy = true
pass_host_header = true
set_xauthrequest = true
email_domains = ["*"]

# Logging
standard_logging = true
request_logging = true
