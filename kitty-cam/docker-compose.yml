services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: kitty-cam-auth
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    env_file:
      - .env
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    depends_on:
      - nginx
    networks:
      - kitty-cam

  nginx:
    image: nginx:1.27-alpine
    container_name: kitty-cam-web
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./kitty-cam.html:/usr/share/nginx/html/index.html:ro
      - ./stream-config.js:/usr/share/nginx/html/stream-config.js:ro
      - ./stream-loader.js:/usr/share/nginx/html/stream-loader.js:ro
      - ./robots.txt:/usr/share/nginx/html/robots.txt:ro
      - ../css:/usr/share/nginx/html/css:ro
      - ../js:/usr/share/nginx/html/js:ro
      - ../assets:/usr/share/nginx/html/assets:ro
      - ../partials:/usr/share/nginx/html/partials:ro
    expose:
      - "8080"
    networks:
      - kitty-cam

networks:
  kitty-cam:
    driver: bridge
