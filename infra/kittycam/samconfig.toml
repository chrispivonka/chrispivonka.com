version = 0.1

[default.deploy.parameters]
stack_name = "kittycam"
region = "us-east-1"
resolve_s3 = true
s3_prefix = "kittycam"
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
parameter_overrides = [
  "HostedZoneId=REPLACE_WITH_HOSTED_ZONE_ID",
]

[default.build.parameters]
use_container = false
